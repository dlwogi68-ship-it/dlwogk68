<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — LEGACY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#070A12; --surface:#0D1220; --surface-2:#131A2E;
            --border:rgba(255,255,255,0.07); --text:#EDE8DC; --text-muted:#68738A;
            --accent:#FF3300; --gold:#C9A23E; --white:#FAFAF8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--accent)}

        nav { position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 5rem;display:flex;justify-content:space-between;align-items:center;background:rgba(7,10,18,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border); }
        .logo { font-family:'Oswald',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:0.18em;color:var(--white);text-decoration:none; }
        .logo em { color:var(--accent);font-style:normal; }
        .nav-links { display:flex;gap:2.5rem;list-style:none; }
        .nav-links a { color:var(--text-muted);text-decoration:none;font-family:'Oswald',sans-serif;font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;transition:color 0.2s; }
        .nav-links a:hover { color:var(--white); }

        main { flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 1.5rem 4rem;position:relative;overflow:hidden; }
        .bg-deco { position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 40%,rgba(255,51,0,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(201,162,62,0.05) 0%,transparent 50%);pointer-events:none; }
        .bg-grid { position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none; }

        .auth-card { background:var(--surface);border:1px solid var(--border);width:100%;max-width:480px;padding:3rem 2.8rem;position:relative;z-index:1;animation:fadeUp 0.6s ease forwards; }
        .auth-card::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent); }

        .auth-logo { text-align:center;margin-bottom:2rem; }
        .auth-logo a { font-family:'Oswald',sans-serif;font-weight:700;font-size:2rem;letter-spacing:0.18em;color:var(--white);text-decoration:none; }
        .auth-logo a em { color:var(--accent);font-style:normal; }
        .auth-title { font-weight:700;font-size:1.25rem;color:var(--white);text-align:center;margin-bottom:0.4rem; }
        .auth-sub { font-size:0.82rem;color:var(--text-muted);text-align:center;margin-bottom:2rem;line-height:1.6; }

        /* Progress steps */
        .steps { display:flex;align-items:center;gap:0;margin-bottom:2rem; }
        .step { flex:1;text-align:center;position:relative; }
        .step-num { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 0.3rem;font-size:0.75rem;font-weight:700;transition:all 0.3s; }
        .step.active .step-num { background:var(--accent);color:white; }
        .step.done .step-num { background:rgba(255,51,0,0.3);color:var(--accent); }
        .step.inactive .step-num { background:var(--surface-2);color:var(--text-muted); }
        .step-label { font-size:0.68rem;color:var(--text-muted);letter-spacing:0.05em; }
        .step.active .step-label { color:var(--accent); }
        .step-line { position:absolute;top:14px;left:calc(50% + 14px);right:calc(-50% + 14px);height:1px;background:var(--border);z-index:-1; }

        .form-row { display:grid;grid-template-columns:1fr 1fr;gap:0.8rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:0.4rem;letter-spacing:0.05em; }
        label span.req { color:var(--accent);margin-left:2px; }
        input[type="email"], input[type="password"], input[type="text"] { width:100%;padding:0.85rem 1rem;background:var(--surface-2);border:1px solid var(--border);color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s; }
        input:focus { border-color:var(--accent); }
        input::placeholder { color:var(--text-muted); }
        .input-hint { font-size:0.72rem;color:var(--text-muted);margin-top:0.3rem; }
        .input-hint.error { color:#FF5555; }
        .input-hint.ok { color:#44CC88; }

        /* 관심 선수 선택 */
        .fighter-picks { display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem; }
        .fighter-chip { padding:0.4rem 0.9rem;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;cursor:pointer;transition:all 0.2s; }
        .fighter-chip.selected { border-color:var(--accent);color:var(--accent);background:rgba(255,51,0,0.08); }

        /* 약관 */
        .terms-box { background:var(--surface-2);border:1px solid var(--border);padding:1rem;margin-bottom:1rem;max-height:100px;overflow-y:auto;font-size:0.75rem;line-height:1.7;color:var(--text-muted); }
        .check-group { display:flex;align-items:flex-start;gap:0.6rem;margin-bottom:0.7rem;cursor:pointer; }
        .check-group input[type="checkbox"] { accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;margin-top:2px; }
        .check-group span { font-size:0.82rem;color:var(--text); }
        .check-group span a { color:var(--accent);text-decoration:none; }
        .check-all { padding-bottom:0.7rem;margin-bottom:0.7rem;border-bottom:1px solid var(--border); }
        .check-all span { font-weight:500; }

        .btn-submit { width:100%;padding:1rem;background:var(--accent);color:white;border:none;font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:0.1em;cursor:pointer;transition:background 0.2s; }
        .btn-submit:hover { background:#ff5533; }
        .btn-submit:disabled { background:var(--surface-2);color:var(--text-muted);cursor:not-allowed; }

        .auth-footer { text-align:center;margin-top:1.4rem;font-size:0.82rem;color:var(--text-muted); }
        .auth-footer a { color:var(--accent);text-decoration:none; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:600px) { nav{padding:1rem 1.5rem} .nav-links{display:none} .auth-card{padding:2rem 1.5rem} .form-row{grid-template-columns:1fr} }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">LEGA<em>CY</em></a>
    <ul class="nav-links">
        <li><a href="index.html">홈</a></li>
        <li><a href="index.html#players">선수</a></li>
        <li><a href="index.html#goods">굿즈</a></li>
        <li><a href="community.html">커뮤니티</a></li>
        <li><a href="schedule.html">경기일정</a></li>
    </ul>
    <a href="login.html" style="font-family:'Oswald',sans-serif;font-size:0.78rem;color:var(--text-muted);text-decoration:none;">로그인</a>
</nav>

<main>
    <div class="bg-deco"></div>
    <div class="bg-grid"></div>

    <div class="auth-card">
        <div class="auth-logo"><a href="index.html">LEGA<em>CY</em></a></div>
        <h1 class="auth-title">회원가입</h1>
        <p class="auth-sub">파이터의 서사와 함께할 준비가 됐나요?</p>

        <!-- 단계 표시 -->
        <div class="steps">
            <div class="step active" id="step1-indicator">
                <div class="step-num">1</div>
                <div class="step-label">기본정보</div>
                <div class="step-line"></div>
            </div>
            <div class="step inactive" id="step2-indicator">
                <div class="step-num">2</div>
                <div class="step-label">관심선수</div>
                <div class="step-line"></div>
            </div>
            <div class="step inactive" id="step3-indicator">
                <div class="step-num">3</div>
                <div class="step-label">약관동의</div>
            </div>
        </div>

        <!-- Step 1: 기본 정보 -->
        <div id="step1">
            <div class="form-row">
                <div class="form-group">
                    <label>이름 <span class="req">*</span></label>
                    <input type="text" id="name" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label>닉네임 <span class="req">*</span></label>
                    <input type="text" id="nickname" placeholder="팬네임">
                </div>
            </div>
            <div class="form-group">
                <label>이메일 <span class="req">*</span></label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>비밀번호 <span class="req">*</span></label>
                <input type="password" id="pw" placeholder="8자 이상, 영문+숫자 조합" oninput="checkPw()">
                <p class="input-hint" id="pw-hint">영문, 숫자 포함 8자 이상</p>
            </div>
            <div class="form-group" style="margin-bottom:1.6rem;">
                <label>비밀번호 확인 <span class="req">*</span></label>
                <input type="password" id="pw2" placeholder="비밀번호 재입력" oninput="checkPw2()">
                <p class="input-hint" id="pw2-hint"></p>
            </div>
            <button class="btn-submit" onclick="goStep(2)">다음 단계</button>
        </div>

        <!-- Step 2: 관심 선수 -->
        <div id="step2" style="display:none;">
            <div class="form-group">
                <label>응원하는 파이터를 선택하세요 (복수 선택 가능)</label>
                <div class="fighter-picks">
                    <button class="fighter-chip" onclick="toggleChip(this)">정찬성</button>
                    <button class="fighter-chip" onclick="toggleChip(this)">최두호</button>
                    <button class="fighter-chip" onclick="toggleChip(this)">김동현</button>
                    <button class="fighter-chip" onclick="toggleChip(this)">김상욱</button>
                    <button class="fighter-chip" onclick="toggleChip(this)">고석현</button>
                    <button class="fighter-chip" onclick="toggleChip(this)">유주상</button>
                </div>
                <p class="input-hint" style="margin-top:0.8rem;">선택한 선수의 신규 굿즈 알림을 받을 수 있습니다.</p>
            </div>
            <div style="display:flex;gap:0.8rem;margin-top:1rem;">
                <button class="btn-submit" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);" onclick="goStep(1)">이전</button>
                <button class="btn-submit" onclick="goStep(3)">다음 단계</button>
            </div>
        </div>

        <!-- Step 3: 약관 동의 -->
        <div id="step3" style="display:none;">
            <div class="check-group check-all" onclick="toggleAll()">
                <input type="checkbox" id="all-agree">
                <span>전체 동의</span>
            </div>
            <div class="check-group">
                <input type="checkbox" class="term-check">
                <span>[필수] <a href="#">이용약관</a>에 동의합니다</span>
            </div>
            <div class="check-group">
                <input type="checkbox" class="term-check">
                <span>[필수] <a href="#">개인정보 수집·이용</a>에 동의합니다</span>
            </div>
            <div class="check-group">
                <input type="checkbox" class="term-check">
                <span>[선택] 마케팅 정보 수신에 동의합니다</span>
            </div>
            <div style="display:flex;gap:0.8rem;margin-top:1.2rem;">
                <button class="btn-submit" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);" onclick="goStep(2)">이전</button>
                <button class="btn-submit" onclick="handleSignup()">가입 완료</button>
            </div>
        </div>

        <div class="auth-footer">
            이미 회원이신가요? <a href="login.html">로그인</a>
        </div>
    </div>
</main>

<script>
function goStep(n) {
    [1,2,3].forEach(i => {
        document.getElementById(`step${i}`).style.display = i===n ? 'block' : 'none';
        const ind = document.getElementById(`step${i}-indicator`);
        ind.className = 'step ' + (i < n ? 'done' : i === n ? 'active' : 'inactive');
    });
}

function toggleChip(el) { el.classList.toggle('selected'); }

function checkPw() {
    const v = document.getElementById('pw').value;
    const hint = document.getElementById('pw-hint');
    const ok = v.length >= 8 && /[a-zA-Z]/.test(v) && /[0-9]/.test(v);
    hint.className = 'input-hint ' + (v.length === 0 ? '' : ok ? 'ok' : 'error');
    hint.textContent = v.length === 0 ? '영문, 숫자 포함 8자 이상' : ok ? '사용 가능한 비밀번호입니다' : '영문+숫자 포함 8자 이상이어야 합니다';
}

function checkPw2() {
    const v1 = document.getElementById('pw').value;
    const v2 = document.getElementById('pw2').value;
    const hint = document.getElementById('pw2-hint');
    if (!v2) { hint.textContent=''; return; }
    hint.className = 'input-hint ' + (v1===v2 ? 'ok' : 'error');
    hint.textContent = v1===v2 ? '비밀번호가 일치합니다' : '비밀번호가 일치하지 않습니다';
}

function toggleAll() {
    const all = document.getElementById('all-agree');
    const checks = document.querySelectorAll('.term-check');
    all.checked = !all.checked;
    checks.forEach(c => c.checked = all.checked);
}

function handleSignup() {
    const name = document.getElementById('name').value.trim();
    const nickname = document.getElementById('nickname').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !nickname || !email) { showToast('필수 정보를 모두 입력해주세요.'); return; }
    const favorites = [...document.querySelectorAll('.fighter-chip.selected')].map(c => c.textContent);
    const user = { email, name, nickname, phone: '', favorites, addresses: [], orders: [] };
    localStorage.setItem('legacy_user', JSON.stringify(user));
    localStorage.setItem('legacy_loggedIn', 'true');
    showToast('회원가입이 완료되었습니다!');
    setTimeout(() => window.location.href = 'index.html', 1000);
}

function showToast(msg) {
    const el = document.createElement('div');
    el.style.cssText='position:fixed;bottom:2rem;right:2rem;background:#FF3300;color:white;padding:0.85rem 1.5rem;font-family:"Noto Sans KR",sans-serif;font-size:0.85rem;z-index:999;box-shadow:0 6px 30px rgba(255,51,0,0.35);';
    el.textContent=msg; document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
}
</script>
</body>
</html>
