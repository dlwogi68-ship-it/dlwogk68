<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0.3" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00081e"/>
      <stop offset="100%" stop-color="#020305"/>
    </linearGradient>
    <linearGradient id="tint" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0055BB" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#0055BB" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0055BB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.97"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#tint)"/>

  <!-- Grid -->
  <g stroke="#0055BB" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="133" x2="600" y2="133"/>
    <line x1="0" y1="266" x2="600" y2="266"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="533" x2="600" y2="533"/>
    <line x1="100" y1="0" x2="100" y2="650"/>
    <line x1="200" y1="0" x2="200" y2="650"/>
    <line x1="300" y1="0" x2="300" y2="650"/>
    <line x1="400" y1="0" x2="400" y2="650"/>
    <line x1="500" y1="0" x2="500" y2="650"/>
  </g>

  <!-- Octagon -->
  <polygon points="531,436 396,561 204,561 69,436 69,254 204,129 396,129 531,254"
           fill="none" stroke="#0055BB" stroke-width="1.5" stroke-opacity="0.13"/>
  <polygon points="511,426 381,546 219,546 89,426 89,264 219,144 381,144 511,264"
           fill="none" stroke="#0055BB" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Decorative number -->
  <text x="590" y="660" font-family="Impact, Arial Black, Arial" font-weight="900"
        font-size="380" fill="#0055BB" opacity="0.065" text-anchor="end">16</text>

  <!-- Fighter silhouette — aggressive forward lean, power stance -->
  <g fill="#0055BB" opacity="0.36">
    <!-- Head (slightly tilted — chin down, aggressive) -->
    <ellipse cx="300" cy="135" rx="50" ry="53" transform="rotate(-5 300 135)"/>
    <!-- Neck -->
    <rect x="280" y="182" width="42" height="26" rx="9"/>
    <!-- Torso (leaning forward) -->
    <path d="M218,208 L382,208 Q397,208 400,224 L416,406 Q300,420 184,406 L200,224 Q203,208 218,208 Z"/>
    <!-- Left arm — straight power jab -->
    <path d="M222,236 L244,260 L52,356 L30,330 Z"/>
    <ellipse cx="38" cy="344" rx="36" ry="27" transform="rotate(-10 38 344)"/>
    <!-- Right arm — pulled back (loading power shot) -->
    <path d="M378,236 L396,255 L440,235 L428,215 Z"/>
    <ellipse cx="445" cy="224" rx="30" ry="24" transform="rotate(20 445 224)"/>
    <!-- Left leg (forward wide stance) -->
    <path d="M228,402 L284,402 L276,538 L218,538 Z"/>
    <path d="M204,532 L282,532 L289,556 L197,556 Z"/>
    <!-- Right leg (back) -->
    <path d="M316,402 L374,402 L392,540 L334,540 Z"/>
    <path d="M326,534 L396,534 L403,558 L320,558 Z"/>
  </g>

  <!-- Energy lines top-left (signature young energy) -->
  <line x1="0" y1="40" x2="120" y2="0" stroke="#0055BB" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="0" y1="90" x2="200" y2="0" stroke="#0055BB" stroke-width="0.7" stroke-opacity="0.1"/>
  <line x1="0" y1="150" x2="280" y2="0" stroke="#0055BB" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Bottom fade -->
  <rect x="0" y="490" width="600" height="310" fill="url(#fade)"/>
  <rect x="0" y="652" width="600" height="148" fill="#010206" opacity="0.98"/>

  <rect x="0" y="652" width="600" height="2" fill="#0055BB" opacity="0.9"/>
  <rect x="0" y="0" width="4" height="800" fill="#0055BB"/>
  <polygon points="545,0 600,0 600,55" fill="#0055BB" opacity="0.55"/>

  <text x="22" y="685" font-family="Impact, 'Arial Narrow', Arial" font-size="11"
        fill="#0055BB" letter-spacing="4">UFC  ·  페더급</text>

  <text x="22" y="742" font-size="64" font-weight="900"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',Arial"
        fill="white">최두호</text>

  <text x="22" y="768" font-family="Impact, Arial" font-size="13"
        fill="#0055BB" opacity="0.85" letter-spacing="5">KOREAN SUPERBOY</text>

  <text x="22" y="791" font-family="Arial" font-size="11"
        fill="white" opacity="0.38" letter-spacing="3">16승 4패  •  MMA</text>
</svg>
