<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0.3" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0400"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>
    <linearGradient id="tint" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC1100" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#CC1100" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#CC1100" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.97"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#tint)"/>

  <!-- Subtle grid -->
  <g stroke="#CC1100" stroke-opacity="0.055" stroke-width="1">
    <line x1="0" y1="133" x2="600" y2="133"/>
    <line x1="0" y1="266" x2="600" y2="266"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="533" x2="600" y2="533"/>
    <line x1="100" y1="0" x2="100" y2="650"/>
    <line x1="200" y1="0" x2="200" y2="650"/>
    <line x1="300" y1="0" x2="300" y2="650"/>
    <line x1="400" y1="0" x2="400" y2="650"/>
    <line x1="500" y1="0" x2="500" y2="650"/>
  </g>

  <!-- Octagon frame (decorative) -->
  <polygon points="531,436 396,561 204,561 69,436 69,254 204,129 396,129 531,254"
           fill="none" stroke="#CC1100" stroke-width="1.5" stroke-opacity="0.12"/>
  <polygon points="511,426 381,546 219,546 89,426 89,264 219,144 381,144 511,264"
           fill="none" stroke="#CC1100" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Large decorative win number -->
  <text x="590" y="660" font-family="Impact, Arial Black, Arial" font-weight="900"
        font-size="380" fill="#CC1100" opacity="0.065" text-anchor="end">17</text>

  <!-- Fighter silhouette — orthodox stance / jab extended -->
  <g fill="#CC1100" opacity="0.35">
    <!-- Head -->
    <circle cx="300" cy="138" r="53"/>
    <!-- Neck -->
    <rect x="279" y="185" width="42" height="28" rx="10"/>
    <!-- Torso -->
    <path d="M222,213 L378,213 Q393,213 396,228 L412,402 Q300,416 188,402 L204,228 Q207,213 222,213 Z"/>
    <!-- Left arm extended (jab) -->
    <path d="M226,242 L246,264 L68,354 L48,330 Z"/>
    <ellipse cx="56" cy="343" rx="34" ry="25" transform="rotate(-12 56 343)"/>
    <!-- Right arm guard -->
    <path d="M374,242 L394,264 L434,350 L412,362 Z"/>
    <ellipse cx="420" cy="370" rx="29" ry="22"/>
    <!-- Left leg -->
    <path d="M232,398 L287,398 L279,532 L222,532 Z"/>
    <path d="M208,526 L286,526 L293,550 L202,550 Z"/>
    <!-- Right leg -->
    <path d="M313,398 L370,398 L387,536 L330,536 Z"/>
    <path d="M322,530 L390,530 L397,554 L316,554 Z"/>
  </g>

  <!-- Blood-red energy lines (signature element) -->
  <line x1="0" y1="60" x2="160" y2="0" stroke="#CC1100" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="0" y1="120" x2="220" y2="0" stroke="#CC1100" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Bottom fade -->
  <rect x="0" y="490" width="600" height="310" fill="url(#fade)"/>
  <!-- Bottom solid panel -->
  <rect x="0" y="652" width="600" height="148" fill="#060102" opacity="0.98"/>

  <!-- Top separator line -->
  <rect x="0" y="652" width="600" height="2" fill="#CC1100" opacity="0.9"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="800" fill="#CC1100"/>

  <!-- Top-right corner triangle -->
  <polygon points="545,0 600,0 600,55" fill="#CC1100" opacity="0.55"/>

  <!-- Org · weight class -->
  <text x="22" y="685" font-family="Impact, 'Arial Narrow', Arial" font-size="11"
        fill="#CC1100" letter-spacing="4">UFC  ·  페더급</text>

  <!-- Fighter name -->
  <text x="22" y="742" font-size="64" font-weight="900"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',Arial"
        fill="white">정찬성</text>

  <!-- Nickname -->
  <text x="22" y="768" font-family="Impact, Arial" font-size="13"
        fill="#CC1100" opacity="0.85" letter-spacing="5">KOREAN ZOMBIE</text>

  <!-- Record -->
  <text x="22" y="791" font-family="Arial" font-size="11"
        fill="white" opacity="0.38" letter-spacing="3">17승 7패  •  MMA</text>
</svg>
