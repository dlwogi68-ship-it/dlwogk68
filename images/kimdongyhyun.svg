<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0.3" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001209"/>
      <stop offset="100%" stop-color="#020404"/>
    </linearGradient>
    <linearGradient id="tint" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#007744" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#007744" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#007744" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.97"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#tint)"/>

  <g stroke="#007744" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="133" x2="600" y2="133"/>
    <line x1="0" y1="266" x2="600" y2="266"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="533" x2="600" y2="533"/>
    <line x1="100" y1="0" x2="100" y2="650"/>
    <line x1="200" y1="0" x2="200" y2="650"/>
    <line x1="300" y1="0" x2="300" y2="650"/>
    <line x1="400" y1="0" x2="400" y2="650"/>
    <line x1="500" y1="0" x2="500" y2="650"/>
  </g>

  <polygon points="531,436 396,561 204,561 69,436 69,254 204,129 396,129 531,254"
           fill="none" stroke="#007744" stroke-width="1.5" stroke-opacity="0.13"/>
  <polygon points="511,426 381,546 219,546 89,426 89,264 219,144 381,144 511,264"
           fill="none" stroke="#007744" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Decorative number — 22 wins, veteran -->
  <text x="590" y="660" font-family="Impact, Arial Black, Arial" font-weight="900"
        font-size="320" fill="#007744" opacity="0.065" text-anchor="end">22</text>

  <!-- Fighter silhouette — wrestling/grappling stance, more grounded -->
  <g fill="#007744" opacity="0.36">
    <!-- Head -->
    <circle cx="300" cy="138" r="53"/>
    <!-- Neck -->
    <rect x="279" y="185" width="42" height="28" rx="10"/>
    <!-- Torso (wider build — welterweight veteran) -->
    <path d="M215,213 L385,213 Q402,213 406,230 L420,408 Q300,424 180,408 L194,230 Q198,213 215,213 Z"/>
    <!-- Both arms slightly wide — wrestling clinch stance -->
    <path d="M218,240 L236,258 L80,320 L64,300 Z"/>
    <ellipse cx="70" cy="310" rx="32" ry="24" transform="rotate(-8 70 310)"/>
    <path d="M382,240 L402,258 L558,320 L542,342 Z"/>
    <ellipse cx="548" cy="332" rx="32" ry="24" transform="rotate(8 548 332)"/>
    <!-- Legs — wide powerful stance -->
    <path d="M226,404 L280,404 L272,542 L216,542 Z"/>
    <path d="M200,536 L278,536 L285,560 L194,560 Z"/>
    <path d="M320,404 L378,404 L396,546 L338,546 Z"/>
    <path d="M330,540 L400,540 L407,564 L324,564 Z"/>
  </g>

  <!-- Veteran horizontal lines (steady, experienced) -->
  <line x1="0" y1="30" x2="600" y2="30" stroke="#007744" stroke-width="0.8" stroke-opacity="0.1"/>
  <line x1="0" y1="55" x2="600" y2="55" stroke="#007744" stroke-width="0.4" stroke-opacity="0.06"/>

  <rect x="0" y="490" width="600" height="310" fill="url(#fade)"/>
  <rect x="0" y="652" width="600" height="148" fill="#010403" opacity="0.98"/>

  <rect x="0" y="652" width="600" height="2" fill="#007744" opacity="0.9"/>
  <rect x="0" y="0" width="4" height="800" fill="#007744"/>
  <polygon points="545,0 600,0 600,55" fill="#007744" opacity="0.55"/>

  <text x="22" y="685" font-family="Impact, 'Arial Narrow', Arial" font-size="11"
        fill="#007744" letter-spacing="4">UFC  ·  웰터급</text>

  <text x="22" y="742" font-size="64" font-weight="900"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',Arial"
        fill="white">김동현</text>

  <text x="22" y="768" font-family="Impact, Arial" font-size="13"
        fill="#007744" opacity="0.85" letter-spacing="5">STUN GUN</text>

  <text x="22" y="791" font-family="Arial" font-size="11"
        fill="white" opacity="0.38" letter-spacing="3">22승 7패  •  MMA</text>
</svg>
