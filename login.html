<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — LEGACY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070A12;
            --surface: #0D1220;
            --surface-2: #131A2E;
            --border: rgba(255,255,255,0.07);
            --text: #EDE8DC;
            --text-muted: #68738A;
            --accent: #FF3300;
            --gold: #C9A23E;
            --white: #FAFAF8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--accent); }

        /* NAV */
        nav {
            position: fixed; top:0; left:0; right:0; z-index:100;
            padding: 1.2rem 5rem;
            display: flex; justify-content:space-between; align-items:center;
            background: rgba(7,10,18,0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family:'Oswald',sans-serif; font-weight:700; font-size:1.6rem; letter-spacing:0.18em; color:var(--white); text-decoration:none; }
        .logo em { color:var(--accent); font-style:normal; }
        .nav-links { display:flex; gap:2.5rem; list-style:none; }
        .nav-links a { color:var(--text-muted); text-decoration:none; font-family:'Oswald',sans-serif; font-size:0.78rem; letter-spacing:0.18em; text-transform:uppercase; transition:color 0.2s; }
        .nav-links a:hover { color:var(--white); }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 1.5rem 4rem;
            position: relative;
            overflow: hidden;
        }

        /* Background deco */
        .bg-deco {
            position: absolute; inset:0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 60%, rgba(255,51,0,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 80% 20%, rgba(201,162,62,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .bg-grid {
            position:absolute; inset:0;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
            background-size: 60px 60px;
            pointer-events:none;
        }

        /* CARD */
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.8rem;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease forwards;
        }
        .auth-card::before {
            content:'';
            position:absolute; top:0; left:0; right:0; height:2px;
            background: var(--accent);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo a { font-family:'Oswald',sans-serif; font-weight:700; font-size:2rem; letter-spacing:0.18em; color:var(--white); text-decoration:none; }
        .auth-logo a em { color:var(--accent); font-style:normal; }

        .auth-title {
            font-weight:700; font-size:1.25rem;
            color:var(--white); text-align:center;
            margin-bottom:0.4rem;
        }
        .auth-sub {
            font-size:0.82rem; color:var(--text-muted);
            text-align:center; margin-bottom:2rem;
            line-height:1.6;
        }

        /* Social login */
        .social-btns { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:1.6rem; }
        .social-btn {
            display:flex; align-items:center; justify-content:center; gap:0.6rem;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family:'Noto Sans KR',sans-serif;
            font-size:0.88rem;
            cursor:pointer;
            transition:all 0.2s;
            text-decoration:none;
        }
        .social-btn:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.03); }
        .social-btn.kakao { background:#FEE500; color:#000; border-color:#FEE500; }
        .social-btn.kakao:hover { background:#fdd700; }
        .social-btn.naver { background:#03C75A; color:#fff; border-color:#03C75A; }
        .social-btn.naver:hover { background:#02b350; }

        /* Divider */
        .divider {
            display:flex; align-items:center; gap:1rem;
            margin-bottom:1.6rem;
            font-size:0.75rem; color:var(--text-muted);
        }
        .divider::before, .divider::after {
            content:''; flex:1; height:1px; background:var(--border);
        }

        /* Form */
        .form-group { margin-bottom:1.1rem; }
        label {
            display:block; font-size:0.78rem; color:var(--text-muted);
            margin-bottom:0.4rem; letter-spacing:0.05em;
        }
        input[type="email"], input[type="password"], input[type="text"] {
            width:100%; padding:0.85rem 1rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--white);
            font-family:'Noto Sans KR',sans-serif;
            font-size:0.9rem;
            outline:none;
            transition:border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color:var(--text-muted); }

        .form-options {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:1.4rem;
        }
        .remember-me { display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--text-muted); cursor:pointer; }
        .remember-me input[type="checkbox"] { accent-color:var(--accent); width:14px; height:14px; }
        .forgot-pw { font-size:0.8rem; color:var(--text-muted); text-decoration:none; transition:color 0.2s; }
        .forgot-pw:hover { color:var(--accent); }

        .btn-submit {
            width:100%; padding:1rem;
            background:var(--accent);
            color:white; border:none;
            font-family:'Oswald',sans-serif;
            font-size:1rem; letter-spacing:0.1em;
            cursor:pointer; transition:background 0.2s;
        }
        .btn-submit:hover { background:#ff5533; }

        .auth-footer {
            text-align:center; margin-top:1.6rem;
            font-size:0.82rem; color:var(--text-muted);
        }
        .auth-footer a { color:var(--accent); text-decoration:none; }
        .auth-footer a:hover { text-decoration:underline; }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }

        @media (max-width:600px) {
            nav { padding:1rem 1.5rem; }
            .nav-links { display:none; }
            .auth-card { padding:2rem 1.5rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">LEGA<em>CY</em></a>
    <ul class="nav-links">
        <li><a href="index.html">홈</a></li>
        <li><a href="index.html#players">선수</a></li>
        <li><a href="index.html#goods">굿즈</a></li>
        <li><a href="community.html">커뮤니티</a></li>
        <li><a href="schedule.html">경기일정</a></li>
    </ul>
    <a href="cart.html" style="font-family:'Oswald',sans-serif;font-size:0.8rem;color:var(--text-muted);text-decoration:none;">🛒 장바구니</a>
</nav>

<main>
    <div class="bg-deco"></div>
    <div class="bg-grid"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <a href="index.html">LEGA<em>CY</em></a>
        </div>

        <h1 class="auth-title">로그인</h1>
        <p class="auth-sub">파이터의 서사와 함께하세요</p>

        <!-- 소셜 로그인 -->
        <div class="social-btns">
            <button class="social-btn kakao" onclick="socialLogin('카카오')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.74 1.6 5.15 4.02 6.62L5 21l4.46-2.36C10.27 18.87 11.12 19 12 19c5.52 0 10-3.48 10-8.2S17.52 3 12 3z"/></svg>
                카카오로 시작하기
            </button>
            <button class="social-btn naver" onclick="socialLogin('네이버')">
                <span style="font-weight:900;font-size:1rem;">N</span>
                네이버로 시작하기
            </button>
        </div>

        <div class="divider">또는 이메일로 로그인</div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> 로그인 상태 유지
                </label>
                <a href="#" class="forgot-pw">비밀번호 찾기</a>
            </div>

            <button type="submit" class="btn-submit">로그인</button>
        </form>

        <div class="auth-footer">
            아직 회원이 아니신가요? <a href="signup.html">회원가입</a>
        </div>
    </div>
</main>

<script>
function handleLogin(e) {
    e.preventDefault();
    const email = document.querySelector('input[type="email"]').value;
    const stored = JSON.parse(localStorage.getItem('legacy_user') || 'null');
    if (stored && stored.email === email) {
        localStorage.setItem('legacy_loggedIn', 'true');
        showToast('로그인되었습니다!');
        setTimeout(() => window.location.href = 'index.html', 800);
    } else if (!stored) {
        showToast('가입된 계정이 없습니다. 회원가입을 먼저 해주세요.');
    } else {
        showToast('이메일 또는 비밀번호가 올바르지 않습니다.');
    }
}
function socialLogin(type) {
    const fake = { email: `${type.toLowerCase()}user@legacy.com`, name: type + '유저', nickname: type + '팬', phone: '010-0000-0000', addresses: [], orders: [] };
    localStorage.setItem('legacy_user', JSON.stringify(fake));
    localStorage.setItem('legacy_loggedIn', 'true');
    showToast(`${type}로 로그인되었습니다!`);
    setTimeout(() => window.location.href = 'index.html', 800);
}
function showToast(msg) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#FF3300;color:white;padding:0.85rem 1.5rem;font-family:"Noto Sans KR",sans-serif;font-size:0.85rem;z-index:999;animation:fadeUp 0.3s ease;box-shadow:0 6px 30px rgba(255,51,0,0.35);';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
}
</script>
</body>
</html>
